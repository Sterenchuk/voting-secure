events {
    worker_connections 10240;
    multi_accept       on;
    use                epoll;
}

http {
    # ── Upstream pools ────────────────────────────────────────────────────────
    upstream backend_servers {
        server backend:3001;
        keepalive 64;          # reuse connections to backend instead of new TCP per request
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    upstream frontend_servers {
        server frontend:3002;
        keepalive 16;
        keepalive_requests 500;
        keepalive_timeout  60s;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format upstream_logging '[$time_local] IP: $remote_addr to: $upstream_addr | "$request" Status: $status';

    # ── Global HTTP tuning ────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  10000;

    # Increase bucket size for long upstream server names
    server_names_hash_bucket_size 128;

    # Client body/header buffers — avoids temp files for normal API payloads
    client_body_buffer_size    128k;
    client_max_body_size       10m;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # Proxy buffers — keeps responses in memory instead of disk
    proxy_buffer_size          16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size    32k;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    proxy_connect_timeout  10s;   # time to establish connection to backend
    proxy_send_timeout     60s;   # time between writes to backend
    proxy_read_timeout     60s;   # time waiting for backend response

    server {
        listen 80;

        access_log /var/log/nginx/access.log upstream_logging buffer=32k flush=5s;

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass             http://backend_servers/;
            proxy_http_version     1.1;
            proxy_set_header       Connection "";           # required for keepalive upstream
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass             http://backend_servers;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_read_timeout     3600s;  # keep WS connections alive for 1hr
        }

        # ── Frontend ──────────────────────────────────────────────────────────
        location / {
            proxy_pass             http://frontend_servers;
            proxy_http_version     1.1;
            proxy_set_header       Connection "";
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}