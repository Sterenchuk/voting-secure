version: "3.8"

networks:
  traefik_proxy:
    name: traefik_proxy
    external: true
  backend_net:
    internal: true

services:
  postgres:
    image: postgres:17
    container_name: voting-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: voting-redis
    restart: always
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --timeout 0
        --tcp-keepalive 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend_net

  mongo:
    image: mongo:7
    container_name: voting-audit-db
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: audit
      MONGO_APP_USER: ${MONGO_APP_USER:-audit_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_net

  init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles:
      - init
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@voting-db:5432/${POSTGRES_DB}?schema=public&connection_limit=5&pool_timeout=30
      GENESIS_SEED: ${GENESIS_SEED}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js"
    networks:
      - backend_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting-backend
    restart: on-failure
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@voting-db:5432/${POSTGRES_DB}?schema=public&connection_limit=20&pool_timeout=30
      GENESIS_SEED: ${GENESIS_SEED}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    expose:
      - "3001"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      replicas: 3
      restart_policy:
        condition: always
    networks:
      - backend_net

  audit-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting-audit-worker
    restart: always
    working_dir: /app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@voting-db:5432/${POSTGRES_DB}?schema=public&connection_limit=5&pool_timeout=30
      REDIS_HOST: redis
      GENESIS_SEED: ${GENESIS_SEED}
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: npm run start:audit-worker
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - backend_net

  mail-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting-mail-worker
    restart: always
    working_dir: /app
    env_file: .env
    environment:
      REDIS_HOST: redis
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    command: npm run start:mail-worker
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - backend_net

  broadcast-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting-broadcast-worker
    restart: always
    working_dir: /app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@voting-db:5432/${POSTGRES_DB}?schema=public&connection_limit=5&pool_timeout=30
      REDIS_HOST: redis
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: npm run start:broadcast-worker
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - backend_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: voting-mailpit
    restart: unless-stopped
    environment:
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_UI_BIND_ADDR: 0.0.0.0:8025
    expose:
      - "8025"
    networks:
      - backend_net
      - traefik_proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://vote.sansesdevelopment.uk/api
        NEXT_PUBLIC_SOCKET_URL: https://vote.sansesdevelopment.uk
    container_name: voting-frontend
    restart: always
    environment:
      - PORT=3002
    depends_on:
      - backend
    expose:
      - "3002"
    deploy:
      replicas: 2
      restart_policy:
        condition: always
    networks:
      - backend_net

  nginx:
    image: nginx:latest
    container_name: voting-load-balancer
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - mailpit
    expose:
      - "80"
    networks:
      - traefik_proxy
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vote.rule=Host(`vote.sansesdevelopment.uk`)"
      - "traefik.http.routers.vote.entrypoints=web"
      - "traefik.http.services.vote.loadbalancer.server.port=80"

  k6:
    image: grafana/k6:latest
    container_name: voting-k6
    profiles:
      - stress-test
    env_file: .env
    environment:
      API_URL: http://nginx/api
      MAILPIT_URL: http://mailpit:8025
    volumes:
      - ./test-scripts:/scripts
    entrypoint: k6
    command: run /scripts/stress-test.js
    depends_on:
      nginx:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - backend_net
      - traefik_proxy

volumes:
  postgres_data:
  redis_data:
  mongo_data:
